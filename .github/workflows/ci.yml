name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    name: Validate manifests + frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bin/validate
        run: bin/validate

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning

  json-parse:
    name: JSON parse check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all JSON files parse cleanly
        run: |
          find . -name "*.json" -not -path "./.git/*" | while read -r f; do
            jq empty "$f" || { echo "Invalid JSON: $f"; exit 1; }
          done
